name: paywall_kit
description: 12 conversion-optimized, drop-in Flutter paywall screens. Backend-agnostic — in_app_purchase or RevenueCat with one flag.
version: 0.1.0
homepage: https://github.com/jayu1023/paywall_kit
repository: https://github.com/jayu1023/paywall_kit
issue_tracker: https://github.com/jayu1023/paywall_kit/issues

topics:
  - paywall
  - subscription
  - monetization
  - iap
  - revenuecat

environment:
  sdk: ^3.9.2
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  in_app_purchase: ^3.2.0
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

# Optional integration: `purchases_flutter` (RevenueCat) — add to your app's
# pubspec.yaml only when wiring RevenueCatAdapter. paywall_kit does not depend
# on it directly so RC-free apps stay slim.

flutter:
